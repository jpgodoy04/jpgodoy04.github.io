<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jp Godoy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a1a;
            color: #fff;
        }

        .header {
            text-align: center;
            padding: 50px 0;
            font-size: 2.5rem;
            font-weight: bold;
            color: #4a90e2;
            text-shadow: 0px 0px 10px #4a90e2;
        }

        .card {
            background: #111;
            border: none;
            color: white;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.5);
        }

        .card video {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #4a90e2;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="header">New Gen Leaders</div>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <video class="card-img-top" controls poster="Thumbnails/Chaewon thumbnail.png">
                        <source src="Vids/Chaewon.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <div class="card-body">
                        <h5 class="card-title">Kim Chaewon</h5>
                        <p class="card-text">Le Sserafim</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <video class="card-img-top" controls>
                        <source src="Vids/Yooyeon.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <div class="card-body">
                        <h5 class="card-title">Kim Yooyeon</h5>
                        <p class="card-text">Triples</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <video class="card-img-top" controls poster="Thumbnails/Karina thumbnail.jpg">
                        <source src="Vids/Karina.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <div class="card-body">
                        <h5 class="card-title">Karina</h5>
                        <p class="card-text">Aespa</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">&copy; John Paul Godoy | Web Development</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
